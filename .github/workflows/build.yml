name: Build SwiftUI Dashboard IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild \
            -project DashboardApp.xcodeproj \
            -scheme DashboardApp \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/DashboardApp.app Payload/
          zip -r Dashboard-SwiftUI.ipa Payload/
          ls -lh Dashboard-SwiftUI.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: Dashboard-SwiftUI-IPA
          path: Dashboard-SwiftUI.ipa
          retention-days: 30
